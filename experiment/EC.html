<!DOCTYPE html>
<html>
<head>
    <title>Sussex - Research</title>

    <!-- jsPsych -->
    <script src="https://unpkg.com/jspsych@8.2.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>

    <link href="https://unpkg.com/jspsych@8.0.1/css/jspsych.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://unpkg.com/@jspsych/plugin-survey@2.0.0/css/survey.css" />

    <script src="parameters.js"></script>
    <script src="demographics.js"></script>

</head>

<body></body>

<!-- Initialise jsPsych FIRST so make_block can call jsPsych.randomization.repeat() -->
<script>
    var jsPsych = initJsPsych({
        show_progress_bar: false,
        message_progress_bar: "Progress",
        on_finish: function () {
            let participantID = jsPsych.data
                .get()
                .filter({ screen: "ppt_id_ig" })
                .values()[0].response["Participant_ID"]

            jsPsych.data.get().localSave("json", `${participantID}_ec.json`)
            jsPsych.data.get().localSave("csv",  `${participantID}_ec.csv`)
        },
    })
</script>

<script src="flanker.js"></script>
<script>
    // Build flanker timeline immediately, before simon.js overwrites the shared names
    var flanker_timeline = [
        flanker_instructions,
        flanker_make_block('practice', 3),
        flanker_make_block_finish('practice'),
        flanker_begin,
    ]
    var n_blocks = 4
    for (var b = 1; b <= n_blocks; b++) {
        flanker_timeline.push(flanker_make_block(b, 10))
        flanker_timeline.push(flanker_make_block_finish(b, b === n_blocks))
    }
</script>

<script src="simon.js"></script>
<script>
    // Build simon timeline now that simon.js has overwritten the shared names
    var simon_timeline = [
        simon_instructions,
        simon_make_block('practice', 3),
        simon_make_block_finish('practice'),
        simon_begin,
    ]
    var n_blocks = 4
    for (var b = 1; b <= n_blocks; b++) {
        simon_timeline.push(simon_make_block(b, 10))
        simon_timeline.push(simon_make_block_finish(b, b === n_blocks))
    }
</script>

<script>

var participant_ID = {
    type: jsPsychSurvey,
    survey_json: {
        title: "About yourself",
        completeText: "Continue",
        pageNextText: "Next",
        pagePrevText: "Previous",
        goNextPageAutomatic: false,
        showQuestionNumbers: false,
        on_start: function () {
            jsPsych.progressBar.progress = 0.0
        },
        pages: [
            {
                elements: [
                    {
                        title: "Enter the participant's ID:",
                        type: "text",
                        placeholder: "P000",
                        name: "Participant_ID",
                        isRequired: true,
                    },
                ],
            },
        ],
    },
    data: {
        screen: "ppt_id_ig",
    },
}

var fullscreen_on = {
    type: jsPsychFullscreen,
    fullscreen_mode: true,
    message: "<p>The experiment will switch to full screen mode when you press the button below</p>",
    button_label: "Continue"
}

var task_break = {
    type: jsPsychHtmlButtonResponse,
    choices: ["Continue"],
    stimulus: `
        <h2><b>Short Break</b></h2>
        <p>Well done — you have completed the first task!</p>
        <p>Take a moment to rest before continuing to the second task.</p>
        <br>
        <p>Press <b>"Continue"</b> when you are ready to proceed.</p>
    `
}

var tasks = jsPsych.randomization.shuffle([flanker_timeline, simon_timeline])

var timeline = [
    participant_ID,
    fullscreen_on,
    ...tasks[0],
    task_break,
    ...tasks[1],
    demographics_waitdatasaving,
]

syncLSL()
    .then(function () { jsPsych.run(timeline) })
    .catch(function (err) {
        console.warn("Proceeding without LSL sync (sync failed):", err)
        jsPsych.run(timeline)
    })

</script>
</html>
